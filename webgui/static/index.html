<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindAI</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">M</div>
      <span>MindAI</span>
    </div>

    <nav class="tabs">
      <button class="tab active" data-tab="chats">Chats</button>
      <button class="tab"        data-tab="models">Models</button>
    </nav>

    <button class="new-btn" id="btnNewChat">
      <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5"/></svg>
      New chat
    </button>

    <div class="chats-list" id="chatsList"></div>

    <div class="sidebar-foot">
      <span class="dot" id="liveDot"></span>
      <span class="muted small" id="connState">connecting…</span>
    </div>
  </aside>

  <main class="content">
    <!-- ──────── CHAT VIEW ──────── -->
    <section class="view view-chat" id="viewChat">
      <header class="topbar">
        <div class="chat-title">
          <span id="activeChatName">No chat selected</span>
          <span class="badge" id="activeChatBadge"></span>
        </div>
        <div class="metrics" id="metrics">
          <span class="metric"><label>tick</label><span id="m-tick">—</span></span>
          <span class="metric"><label>mood</label><span id="m-mood">—</span></span>
          <span class="metric"><label>surprise</label><span id="m-surprise">—</span></span>
          <span class="metric"><label>DA</label><span id="m-da">—</span></span>
          <span class="metric"><label>cortisol</label><span id="m-cort">—</span></span>
          <span class="metric"><label>state</label><span id="m-state">—</span></span>
        </div>
        <div class="actions">
          <button class="ghost" id="btnVoice" title="Pick voice">voice</button>
          <button class="ghost" id="btnSave"  title="Save brain">save</button>
          <button class="ghost" id="btnClear" title="Clear injected media">clear</button>
        </div>
      </header>

      <div class="popover" id="voicePopover">
        <h3>Voice</h3>
        <label>
          <span>Voice</span>
          <select id="voiceSelect"></select>
        </label>
        <label>
          <span>Pitch <em id="pitchVal">+0.0 Hz</em></span>
          <input type="range" id="pitchSlider" min="-12" max="12" step="0.5" value="0" />
        </label>
        <label>
          <span>Rate <em id="rateVal">1.00x</em></span>
          <input type="range" id="rateSlider" min="0.5" max="2.0" step="0.05" value="1.0" />
        </label>
        <div class="popover-actions">
          <button class="ghost" id="voicePreview">preview</button>
          <button class="ghost primary" id="voiceApply">apply</button>
        </div>
      </div>

      <div class="chat" id="chat">
        <div class="welcome">
          <h1>Hello.</h1>
          <p class="muted">Select a chat from the sidebar, or click <b>New chat</b> to begin.<br/>
            Drop a photo, video, or audio file anywhere on the page.<br/>
            Hold the mic button to talk.</p>
        </div>
      </div>

      <footer class="composer">
        <button class="icon" id="btnAttach" title="Attach file">
          <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M16.5 6.5L8 15a3 3 0 0 0 4.24 4.24l9.19-9.19a5 5 0 1 0-7.07-7.07L4.93 13.43a7 7 0 1 0 9.9 9.9l8.49-8.49"/></svg>
        </button>
        <input type="file" id="fileInput" accept="image/*,video/*,audio/*" hidden />
        <textarea id="prompt" rows="1" placeholder="Talk to MindAI…"></textarea>
        <button class="icon mic" id="btnMic" title="Hold to talk">
          <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
        </button>
        <button class="icon send" id="btnSend" title="Send">
          <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </footer>
    </section>

    <!-- ──────── MODELS VIEW ──────── -->
    <section class="view view-models hidden" id="viewModels">
      <header class="topbar">
        <div class="chat-title"><span>Models</span></div>
        <div style="flex:1"></div>
        <div class="actions">
          <button class="ghost primary" id="btnNewModel">New model</button>
        </div>
      </header>
      <div class="models-list" id="modelsList"></div>
    </section>
  </main>

  <!-- ──────── DROPZONE OVERLAY ──────── -->
  <div class="dropzone" id="dropzone">
    <div class="dz-inner">drop your file here</div>
  </div>

  <!-- ──────── NEW CHAT MODAL ──────── -->
  <div class="modal" id="newChatModal">
    <div class="modal-card">
      <h2>New chat</h2>
      <label>
        <span>Name</span>
        <input type="text" id="ncName" placeholder="My conversation" />
      </label>

      <div class="mode-picker">
        <button class="mode-btn active" data-mode="local">
          <h4>Local</h4>
          <p>Brain runs on this computer.</p>
        </button>
        <button class="mode-btn" data-mode="cloud">
          <h4>Cloud</h4>
          <p>Brain runs on Google Colab. Paste your tunnel URL.</p>
        </button>
      </div>

      <label id="ncCloudUrlWrap" class="hidden">
        <span>Cloud URL</span>
        <input type="text" id="ncCloudUrl" placeholder="wss://abcd-1234.ngrok-free.app" />
        <button class="ghost small" id="ncFetchRemote" type="button">refresh models from cloud →</button>
      </label>

      <label>
        <span>Model <em class="muted small" id="ncModelHint">choose a model — neurons evolve as you chat, so the chat will be permanently bound to it</em></span>
        <select id="ncModelSelect"></select>
      </label>

      <div class="modal-actions">
        <button class="ghost" id="ncCancel">Cancel</button>
        <button class="ghost primary" id="ncCreate">Create</button>
      </div>
    </div>
  </div>

  <!-- ──────── NEW MODEL MODAL ──────── -->
  <div class="modal" id="newModelModal">
    <div class="modal-card">
      <h2>New model</h2>
      <label>
        <span>Name</span>
        <input type="text" id="nmName" placeholder="My model" />
      </label>
      <label>
        <span>Clone from <em class="muted small">leave empty for a fresh untrained brain</em></span>
        <select id="nmBaseSelect">
          <option value="">— None (fresh brain) —</option>
        </select>
      </label>
      <div class="modal-actions">
        <button class="ghost" id="nmCancel">Cancel</button>
        <button class="ghost primary" id="nmCreate">Create</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js" defer></script>
</body>
</html>
